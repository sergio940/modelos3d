<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Prueba Modelo 3D Local</title>

  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/examples/js/loaders/OBJLoader.js"></script>

  <style>
    body {
      margin: 0;
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      border: 2px solid #ccc;
      border-radius: 10px;
    }
  </style>
</head>
<body>
<script>
  // Crear escena
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xffffff);

  // Cámara
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 5;

  // Renderer
  const renderer = new THREE.WebGLRenderer({antialias: true});
  renderer.setSize(800, 600);
  document.body.appendChild(renderer.domElement);

  // Luz
  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(5,5,5);
  scene.add(light);

  // Cargar modelo OBJ local
  const loader = new THREE.OBJLoader();
  loader.load('white_mesh.obj', function(object){
      scene.add(object);
      object.rotation.y = 0;
      animate();
  }, undefined, function(error){
      console.error('Error cargando el OBJ:', error);
  });

  // Animación (rota el modelo)
  function animate(){
      requestAnimationFrame(animate);
      scene.rotation.y += 0.01; // rota toda la escena
      renderer.render(scene, camera);
  }
</script>
</body>
</html>
