<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modelo 3D - White Mesh</title>
<style>
  body { margin: 0; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>

<!-- Three.js y OBJLoader -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/OBJLoader.js"></script>

<script>
// Escena, cámara y renderer
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Luz principal
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(0, 5, 5);
scene.add(light);

// Luz ambiental
const ambient = new THREE.AmbientLight(0xcccccc, 0.8);
scene.add(ambient);

// Cargar modelo OBJ localmente
const loader = new THREE.OBJLoader();
loader.load(
  'white_mesh.obj',  // Debe estar en la misma carpeta que este index.html
  function(obj) {
    // Ajustes de escala y posición
    obj.scale.set(0.5, 0.5, 0.5);  // ajusta si el modelo es grande o pequeño
    obj.rotation.x = -Math.PI/2;   // gira si está acostado
    obj.position.set(0,0,0);
    scene.add(obj);
  },
  function(xhr){ console.log((xhr.loaded/xhr.total*100) + '% cargado'); },
  function(error){ console.error('Error al cargar OBJ:', error); }
);

// Posición de la cámara
camera.position.set(0, 1, 3);

// Controles de animación (rotación suave)
function animate() {
  requestAnimationFrame(animate);
  scene.rotation.y += 0.002; // gira lentamente todo el objeto
  renderer.render(scene, camera);
}
animate();

// Ajuste al cambiar tamaño de ventana
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
