<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>OBJ Local como Imagen</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f0f0f0;
      margin: 0;
    }
    model-viewer {
      width: 600px;
      height: 400px;
      border: 2px solid #ccc;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<model-viewer src="white_mesh.obj"
              alt="Modelo 3D local"
              auto-rotate
              camera-controls
              background-color="#ffffff">
</model-viewer>

</body>
</html>
