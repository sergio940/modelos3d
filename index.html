<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor 3D - White Mesh</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 14px;
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        
        #info h1 {
            font-size: 18px;
            margin-bottom: 8px;
        }
        
        #info p {
            margin: 4px 0;
            opacity: 0.9;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 30px 50px;
            border-radius: 10px;
            display: none;
            z-index: 200;
        }
        
        #error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff6b6b;
            font-size: 16px;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px 50px;
            border-radius: 10px;
            display: none;
            z-index: 200;
            max-width: 80%;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>🎨 Visor 3D</h1>
        <p>🖱️ Arrastra para rotar</p>
        <p>🔍 Scroll para zoom</p>
        <p>📱 Modelo: white_mesh.obj</p>
    </div>
    
    <div id="loading">Cargando modelo 3D...</div>
    <div id="error"></div>
    
    <div id="canvas-container"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

        // Variables globales
        let scene, camera, renderer, controls;
        let model;

        // Inicializar escena
        function init() {
            // Escena
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1e3c72);
            scene.fog = new THREE.Fog(0x1e3c72, 10, 50);

            // Cámara
            camera = new THREE.PerspectiveCamera(
                45, 
                window.innerWidth / window.innerHeight, 
                0.1, 
                1000
            );
            camera.position.set(5, 5, 5);
            camera.lookAt(0, 0, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Controles
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = false;
            controls.minDistance = 1;
            controls.maxDistance = 20;

            // Luces
            setupLights();

            // Grid de ayuda
            const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
            scene.add(gridHelper);

            // Cargar modelo
            loadModel();

            // Event listeners
            window.addEventListener('resize', onWindowResize);
        }

        function setupLights() {
            // Luz ambiental
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            // Luz direccional principal (sol)
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(10, 10, 10);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            // Luz direccional secundaria
            const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight2.position.set(-10, 5, -10);
            scene.add(dirLight2);

            // Luz puntual
            const pointLight = new THREE.PointLight(0x4488ff, 0.5);
            pointLight.position.set(0, 5, 0);
            scene.add(pointLight);
        }

        function loadModel() {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            
            loadingEl.style.display = 'block';

            const loader = new OBJLoader();
            
            // Cargar el archivo OBJ (ruta relativa al mismo directorio)
            loader.load(
                './white_mesh.obj',
                // Callback de éxito
                function (object) {
                    model = object;
                    
                    // Configurar el material
                    object.traverse(function (child) {
                        if (child.isMesh) {
                            child.material = new THREE.MeshStandardMaterial({
                                color: 0xffffff,
                                metalness: 0.3,
                                roughness: 0.7,
                                side: THREE.DoubleSide
                            });
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });

                    // Centrar y escalar el modelo
                    const box = new THREE.Box3().setFromObject(object);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());
                    
                    // Mover el modelo al centro
                    object.position.sub(center);
                    
                    // Escalar si es necesario
                    const maxDim = Math.max(size.x, size.y, size.z);
                    if (maxDim > 5) {
                        const scale = 5 / maxDim;
                        object.scale.setScalar(scale);
                    }
                    
                    // Añadir a la escena
                    scene.add(object);
                    
                    loadingEl.style.display = 'none';
                    console.log('✅ Modelo cargado correctamente');
                },
                // Callback de progreso
                function (xhr) {
                    if (xhr.total > 0) {
                        const percent = (xhr.loaded / xhr.total * 100).toFixed(0);
                        loadingEl.textContent = `Cargando: ${percent}%`;
                        console.log(`${percent}% completado`);
                    }
                },
                // Callback de error
                function (error) {
                    loadingEl.style.display = 'none';
                    errorEl.style.display = 'block';
                    errorEl.innerHTML = `
                        <strong>❌ Error al cargar el modelo</strong><br><br>
                        ${error.message}<br><br>
                        <small>Asegúrate de que white_mesh.obj existe en el mismo directorio que index.html</small>
                    `;
                    console.error('Error cargando el modelo:', error);
                }
            );
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Iniciar
        init();
        animate();
    </script>
</body>
</html>
