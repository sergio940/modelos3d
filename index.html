<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modelo 3D OBJ</title>
<style>
  body { margin: 0; }
  canvas { display: block; }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/OBJLoader.js"></script>

<script>
// Escena, cámara y renderer
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Luz
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(0,1,1);
scene.add(light);

// Cargar modelo OBJ desde GitHub
const loader = new THREE.OBJLoader();
loader.load(
  'https://raw.githubusercontent.com/sergio940/modelos3d/refs/heads/main/white_mesh.obj',
  function(obj) {
    scene.add(obj);
    obj.position.set(0,0,0);
  },
  function(xhr){ console.log((xhr.loaded/xhr.total*100) + '% cargado'); },
  function(error){ console.error('Error al cargar OBJ:', error); }
);

// Cámara
camera.position.z = 5;

// Animación
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

// Ajustar ventana
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
