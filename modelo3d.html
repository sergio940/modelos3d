<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Prueba Modelo 3D</title>
  <!-- model-viewer desde CDN -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f0f0f0;
      margin: 0;
      font-family: Arial, sans-serif;
    }
    model-viewer {
      width: 600px;
      height: 400px;
      border: 2px solid #ccc;
      border-radius: 10px;
      background-color: #ffffff;
    }
  </style>
</head>
<body>

<model-viewer src="https://raw.githubusercontent.com/sergio940/modelos3d/main/white_mesh.obj"
              alt="Modelo 3D de prueba"
              camera-controls
              auto-rotate
              shadow-intensity="0.5"
              background-color="#ffffff">
</model-viewer>

</body>
</html>
